name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC trusted publishing + provenance. No NPM_TOKEN secret needed.
      # Requires a Trusted Publisher configured on npmjs.com for this package
      # (org sonilo-ai, repo sonilo-video-kit, workflow publish.yml). The
      # package must already exist there — the initial version is published
      # once by hand (or with a temporary token), as OIDC cannot create it.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Update npm (OIDC publishing requires npm >= 11.5.1)
        # Pinned to major 11 (matches sonilo-js, which publishes this way).
        run: npm install -g npm@11
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
      - name: Publish (skip if version already on the registry)
        # Tag refs only: a workflow_dispatch on a branch runs tests/build but
        # never publishes. To retry a failed publish, dispatch on the tag:
        # gh workflow run publish.yml --ref vX.Y.Z
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "sonilo-video-kit@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "sonilo-video-kit@${PKG_VERSION} already published — skipping"
          else
            npm publish --provenance --access public
          fi
